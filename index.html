<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTS Server Databáze</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Oprava výšky pro mobilní prohlížeče (zohledňuje lišty) */
        body { 
            background-color: #f0f2f5; 
            color: #1c1e21; 
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
        }
        
        /* Chybová obrazovka */
        #error-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 20px; text-align: center; background: white; }
        #error-screen h1 { font-size: 1.2rem; color: #333; margin-bottom: 10px; font-weight: 500; }
        #error-screen p { color: #888; font-size: 0.9rem; }

        /* Hlavní kontejner aplikace */
        #app { 
            width: 100%; 
            max-width: 600px; 
            height: 100%; 
            margin: 0 auto; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1); 
        }
        
        /* Hlavičky */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: white; min-height: 60px; }
        .header h2 { font-size: 1.2rem; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-info { display: flex; align-items: center; gap: 8px; font-weight: bold; color: #0056b3; flex-shrink: 0; }
        .user-info span.icon { font-size: 1.2rem; }
        hr { border: none; border-top: 1px solid #e0e0e0; }

        /* Tlačítko Zpět */
        #btn-back { background: none; border: none; font-size: 1rem; color: #0056b3; cursor: pointer; font-weight: bold; padding: 5px; }

        /* Seznam chatů */
        #chat-list-view { display: flex; flex-direction: column; height: 100%; }
        #chat-buttons { padding: 15px; display: flex; flex-direction: column; gap: 12px; flex-grow: 1; overflow-y: auto; }
        .chat-btn { position: relative; padding: 18px; border-radius: 12px; border: none; color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-align: left; transition: transform 0.1s; }
        .chat-btn:active { transform: scale(0.98); }
        
        /* Různé barvy pro tlačítka chatu */
        .btn-vsichni { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); }
        .btn-adam_alenka { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); }
        .btn-roller_alenka { background: linear-gradient(135deg, #0ba360 0%, #3cba92 100%); }
        
        /* Červený puntík nepřečtených */
        .unread-dot { position: absolute; top: -4px; right: -4px; background: red; width: 18px; height: 18px; border-radius: 50%; border: 2px solid white; display: none; }
        .has-unread .unread-dot { display: block; }

        /* Tlačítko Prank */
        .btn-prank { background: #dc3545; color: white; border: none; padding: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 8px; margin: 15px; }

        /* Okno konkrétního chatu */
        #chat-view { display: flex; flex-direction: column; height: 100%; }
        #messages-container { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: #ffffff; }
        
        /* Zprávy */
        .msg-row { display: flex; flex-direction: column; width: 100%; margin-bottom: 4px; }
        .msg-bubble { max-width: 85%; padding: 8px 12px; border-radius: 18px; position: relative; word-wrap: break-word; font-size: 0.95rem; white-space: pre-wrap; }
        
        .msg-row.me { align-items: flex-end; }
        .msg-row.me .msg-bubble { background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .msg-row.me .msg-time { color: rgba(255,255,255,0.7); }
        
        .msg-row.them { align-items: flex-start; }
        .msg-row.them .msg-bubble { background: #f0f0f0; color: black; border-bottom-left-radius: 4px; }
        .msg-row.them .msg-time { color: #888; }
        
        .msg-author { font-size: 0.75rem; font-weight: bold; color: #0056b3; margin-bottom: 2px; margin-left: 8px; }
        .msg-time { font-size: 0.65rem; text-align: right; margin-top: 4px; display: block; }
        .msg-link { color: inherit; text-decoration: underline; font-weight: bold; }

        /* Dělící čára pro nové zprávy */
        .unread-divider { display: flex; align-items: center; text-align: center; margin: 15px 0; color: #dc3545; font-size: 0.8rem; font-weight: bold; }
        .unread-divider::before, .unread-divider::after { content: ''; flex: 1; border-bottom: 1px solid #dc3545; }
        .unread-divider::before { margin-right: 10px; }
        .unread-divider::after { margin-left: 10px; }

        /* Spodní panel zadávání zpráv */
        .input-area { display: flex; align-items: flex-end; padding: 10px; background: white; border-top: 1px solid #e0e0e0; gap: 8px; }
        
        #btn-send { background: #28a745; color: white; border: none; width: 42px; height: 42px; border-radius: 50%; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0; }
        
        #message-input { flex-grow: 1; background: #f0f2f5; border: none; border-radius: 20px; padding: 10px 15px; font-size: 1rem; resize: none; overflow-y: hidden; min-height: 42px; max-height: 150px; outline: none; }
        
        .toggles { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
        .toggles button { width: 34px; height: 34px; border-radius: 50%; border: 1px solid #ccc; background: white; font-weight: bold; font-size: 0.8rem; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .toggles button.active { background: #0084ff; color: white; border-color: #0084ff; }

        /* --- MOBILNÍ OPTIMALIZACE --- */
        @media (max-width: 600px) {
            #app { max-width: 100%; box-shadow: none; }
            .header { padding: 10px 15px; }
            .header h2 { font-size: 1.1rem; }
            .input-area { padding: 8px; gap: 5px; }
            /* Na mobilu dáme Tt a Link vedle sebe, aby nebyly tak vysoké */
            .toggles { flex-direction: row; }
            .toggles button { width: 36px; height: 36px; }
            #btn-send { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

    <div id="error-screen">
        <h1>Uživatele se v rámci sítě nepodařilo autorizovat. Zkontrolujte prosím své ID a URL adresu.</h1>
        <p>New Technology Software: Error 404</p>
    </div>

    <div id="app">
        <div id="chat-list-view">
            <div class="header">
                <h2>Chaty mezi námi</h2>
                <div class="user-info">
                    <span class="icon">👤</span> <span id="user-name"></span>
                </div>
            </div>
            <hr>
            <div id="chat-buttons"></div>
            <hr>
            <button id="btn-prank" class="btn-prank">Mód nouze</button>
        </div>

        <div id="chat-view" style="display:none;">
            <div class="header">
                <h2 id="current-chat-name">Název chatu</h2>
                <button id="btn-back">⬅ Zpět</button>
            </div>
            <hr>
            <div id="messages-container"></div>
            <div class="input-area">
                <button id="btn-send" title="Odeslat zprávu">➔</button>
                <textarea id="message-input" rows="1" placeholder="Napište zprávu..."></textarea>
                <div class="toggles">
                    <button id="toggle-tt" class="active" title="Běžný text">Tt</button>
                    <button id="toggle-link" title="Odkaz">🔗</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, update, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBepISKDbwwF4nr3omck7MF8kBG8QV26WI",
            authDomain: "chaty-e06fb.firebaseapp.com",
            databaseURL: "https://chaty-e06fb-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chaty-e06fb",
            storageBucket: "chaty-e06fb.firebasestorage.app",
            messagingSenderId: "1011142936145",
            appId: "1:1011142936145:web:4febef996654f55ca31a70"
        };

        const appFirebase = initializeApp(firebaseConfig);
        const db = getDatabase(appFirebase);

        const USERS = {
            '6fs5652fb32dsh32f32vf2x1d2b21': { name: 'Roller', chats: ['vsichni', 'roller_alenka'] },
            'swf45bg4dg4b87tjrf56sed4tj5i4k5': { name: 'Adam', chats: ['vsichni', 'adam_alenka'] },
            'fdv56gg8rd56fg23fsg632654fgs56': { name: 'Alenka', chats: ['vsichni', 'adam_alenka', 'roller_alenka'] }
        };

        const CHAT_NAMES = {
            'vsichni': 'Všichni',
            'adam_alenka': 'Adam - Alenka',
            'roller_alenka': 'Roller - Alenka'
        };

        let currentUser = null;
        let currentChatId = null;
        let activeInputType = 'text';
        let messagesCache = {};
        let unreadCounts = {};
        let unreadBoundaryMessageId = null;

        const errorScreen = document.getElementById('error-screen');
        const appScreen = document.getElementById('app');
        const chatListView = document.getElementById('chat-list-view');
        const chatView = document.getElementById('chat-view');
        const userNameEl = document.getElementById('user-name');
        const chatButtonsContainer = document.getElementById('chat-buttons');
        const currentChatNameEl = document.getElementById('current-chat-name');
        const messagesContainer = document.getElementById('messages-container');
        const messageInput = document.getElementById('message-input');
        const btnSend = document.getElementById('btn-send');
        const btnBack = document.getElementById('btn-back');
        const btnPrank = document.getElementById('btn-prank');
        const toggleTt = document.getElementById('toggle-tt');
        const toggleLink = document.getElementById('toggle-link');

        function init() {
            const hash = window.location.hash;
            if (hash === '#prank') {
                set(ref(db, 'global/main'), 0).then(() => {
                    window.location.href = 'https://nts-windows-tools.github.io/server-database/';
                });
                return; 
            }

            const id = hash.substring(1);
            if (!id || !USERS[id]) {
                showError();
            } else {
                currentUser = { id: id, ...USERS[id] };
                userNameEl.innerText = currentUser.name;
                errorScreen.style.display = 'none';
                appScreen.style.display = 'flex';
                setupGlobalListener();
                renderChatButtons();
                setupChatsListeners();
            }
        }

        function showError() {
            errorScreen.style.display = 'flex';
            appScreen.style.display = 'none';
        }

        function setupGlobalListener() {
            const globalRef = ref(db, 'global/main');
            onValue(globalRef, (snapshot) => {
                const val = snapshot.val();
                if (val === null) {
                    set(globalRef, 1);
                } else if (val == 0) {
                    window.location.href = 'https://nts-windows-tools.github.io/server-database/';
                }
            });
            btnPrank.addEventListener('click', () => {
                set(ref(db, 'global/main'), 0);
            });
        }

        function renderChatButtons() {
            chatButtonsContainer.innerHTML = '';
            currentUser.chats.forEach(chatId => {
                const btn = document.createElement('button');
                btn.className = `chat-btn btn-${chatId}`;
                btn.id = `chat-btn-${chatId}`;
                btn.innerHTML = `${CHAT_NAMES[chatId]} <div class="unread-dot"></div>`;
                btn.onclick = () => openChat(chatId);
                chatButtonsContainer.appendChild(btn);
            });
        }

        function setupChatsListeners() {
            currentUser.chats.forEach(chatId => {
                onValue(ref(db, `chaty/${chatId}`), (snapshot) => {
                    const data = snapshot.val();
                    let unreadCount = 0;
                    let msgs = [];
                    if (data) {
                        for (let key in data) {
                            msgs.push({ id: key, ...data[key] });
                            if (!data[key].precetli || !data[key].precetli[currentUser.id]) {
                                unreadCount++;
                            }
                        }
                    }
                    messagesCache[chatId] = msgs;
                    unreadCounts[chatId] = unreadCount;
                    const btn = document.getElementById(`chat-btn-${chatId}`);
                    if (btn) {
                        if (unreadCount > 0 && currentChatId !== chatId) {
                            btn.classList.add('has-unread');
                        } else {
                            btn.classList.remove('has-unread');
                        }
                    }
                    if (currentChatId === chatId) {
                        updateChatMessagesUI();
                    }
                });
            });
        }

        function openChat(chatId) {
            currentChatId = chatId;
            currentChatNameEl.innerText = CHAT_NAMES[chatId];
            chatListView.style.display = 'none';
            chatView.style.display = 'flex';
            unreadBoundaryMessageId = null;
            if (messagesCache[chatId]) {
                const firstUnread = messagesCache[chatId].find(m => !m.precetli || !m.precetli[currentUser.id]);
                if (firstUnread) {
                    unreadBoundaryMessageId = firstUnread.id;
                }
            }
            const btn = document.getElementById(`chat-btn-${chatId}`);
            if (btn) btn.classList.remove('has-unread');
            updateChatMessagesUI();
            setTimeout(() => {
                if (unreadBoundaryMessageId) {
                    const divider = document.getElementById('divider-new');
                    if (divider) divider.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    scrollToBottom();
                }
            }, 100);
        }

        btnBack.addEventListener('click', () => {
            currentChatId = null;
            unreadBoundaryMessageId = null;
            chatView.style.display = 'none';
            chatListView.style.display = 'flex';
        });

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
        }

        function updateChatMessagesUI() {
            if (!currentChatId) return;
            const msgs = messagesCache[currentChatId] || [];
            let html = '';
            let updatesNeeded = {};
            msgs.forEach(msg => {
                if (msg.id === unreadBoundaryMessageId) {
                    html += `<div id="divider-new" class="unread-divider">Nové zprávy:</div>`;
                }
                const isMe = msg.author === currentUser.id;
                const authorName = USERS[msg.author] ? USERS[msg.author].name : 'Neznámý';
                const timeStr = formatTime(msg.time);
                // Formátování obsahu
                let contentHTML = msg.text.replace(/</g, "&lt;").replace(/>/g, "&gt;"); // Nejdříve vše "zneškodníme"

                // Podpora pro tučný text pomocí **tučný text**
                contentHTML = contentHTML.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");

                // Podpora pro HTML tag <b>, pokud ho přesto chceš psát ručně
                contentHTML = contentHTML.replace(/&lt;b&gt;(.*?)&lt;\/b&gt;/g, "<b>$1</b>");

                if (msg.type === 'link') {
                    contentHTML = `<a href="${msg.text.startsWith('http') ? msg.text : 'https://' + msg.text}" target="_blank" class="msg-link">${contentHTML}</a>`;
                }
                html += `
                    <div class="msg-row ${isMe ? 'me' : 'them'}">
                        ${!isMe && currentChatId === 'vsichni' ? `<span class="msg-author">${authorName}</span>` : ''}
                        <div class="msg-bubble">
                            ${contentHTML}
                            <span class="msg-time">${timeStr}</span>
                        </div>
                    </div>`;
                if (!msg.precetli || !msg.precetli[currentUser.id]) {
                    updatesNeeded[`chaty/${currentChatId}/${msg.id}/precetli/${currentUser.id}`] = true;
                }
            });
            const isAtBottom = messagesContainer.scrollHeight - messagesContainer.scrollTop <= messagesContainer.clientHeight + 100;
            messagesContainer.innerHTML = html;
            if (isAtBottom && !unreadBoundaryMessageId) {
                scrollToBottom();
            }
            if (Object.keys(updatesNeeded).length > 0) {
                update(ref(db), updatesNeeded);
            }
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') this.style.height = '42px';
        });

        toggleTt.addEventListener('click', () => {
            activeInputType = 'text';
            toggleTt.classList.add('active');
            toggleLink.classList.remove('active');
            messageInput.focus();
        });

        toggleLink.addEventListener('click', () => {
            activeInputType = 'link';
            toggleLink.classList.add('active');
            toggleTt.classList.remove('active');
            messageInput.focus();
        });

        btnSend.addEventListener('click', sendMessage);
        // Teď Enter jen vytvoří nový řádek, zpráva se odešle pouze kliknutím na tlačítko ➔
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                // Necháme prohlížeč udělat nový řádek (standardní chování)
                // a jen zavoláme auto-resize, aby se okno zvětšilo
                setTimeout(() => {
                    messageInput.style.height = 'auto';
                    messageInput.style.height = (messageInput.scrollHeight) + 'px';
                }, 0);
            }
        });

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            const newMsgRef = push(ref(db, `chaty/${currentChatId}`));
            set(newMsgRef, {
                text: text,
                time: Date.now(),
                type: activeInputType,
                author: currentUser.id,
                precetli: { [currentUser.id]: true }
            }).then(() => {
                messageInput.value = '';
                messageInput.style.height = '42px';
                activeInputType = 'text';
                toggleTt.classList.add('active');
                toggleLink.classList.remove('active');
                scrollToBottom();
                unreadBoundaryMessageId = null;
            });
        }

        init();
    </script>
</body>
</html>
